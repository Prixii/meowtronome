name: meowtronome
description: "A new Flutter project."
publish_to: 'none'
version: 0.9.9+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_gen_runner: ^5.14.1
  flutter_soloud: ^4.0.11
  audio_service: ^0.18.18
  audio_session: ^0.2.2
  freezed: ^3.2.5
  freezed_annotation: ^3.1.0
  provider: ^6.1.5+1
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  talker: ^5.1.17
  uuid: ^4.5.3
  window_manager: ^0.5.2
  json_annotation: ^4.12.0
  fl_chart: ^1.2.0
  http: ^1.6.0
  package_info_plus: ^10.2.1
  url_launcher: ^6.3.2
  pub_semver: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  json_serializable: ^6.14.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/image/
  fonts:
    - family: DoHyeon
      fonts:
        - asset: assets/font/DoHyeon-Regular.otf
    - family: AlimamaShuhei
      fonts:
        - asset: assets/font/alimama-shuhei.ttf
